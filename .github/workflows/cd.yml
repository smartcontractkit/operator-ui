name: CD

on:
  push:
    branches:
      - "main"

jobs:
  # Whenever the main branch is updated with changesets
  # We create a PR that has the output of "changeset version"
  # as the diff against the main branch
  #
  # If a PR already exists, we update the existing PR instead
  upsert-pull-request:
    name: Upsert PR
    runs-on: ubuntu-latest
    steps:

      - name: Checkout the repo
        uses: actions/checkout@v6

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
          cache: yarn

      - name: Run yarn install
        run: yarn install --frozen-lockfile

      - name: Upsert Release Pull Request
        id: changesets
        uses: smartcontractkit/.github/actions/signed-commits@changesets-signed-commits/v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Release
    runs-on: ubuntu-latest
    steps:

      - name: Checkout the repo
        uses: actions/checkout@v6

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
          cache: yarn

      - name: Run yarn install
        run: yarn install --frozen-lockfile

      - name: Setup project
        run: yarn setup
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build project
        run: yarn build

      - name: Run yarn install for scripts
        run: yarn install --frozen-lockfile
        working-directory: scripts

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn -s release
        working-directory: scripts
